<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hot Feed — PINGPING</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Workbench&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --neon-pink: #ec4899;
        --neon-coral: #fb923c;
        --bg-dark: #050510;
    }
    
    * { box-sizing: border-box; }
    
    body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-dark);
        background-image: 
            linear-gradient(rgba(236, 72, 153, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(236, 72, 153, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        color: #fce7f3;
        font-family: 'Noto Sans SC', -apple-system, sans-serif;
        min-height: 100vh;
    }
    
    @keyframes card-in {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .scanline-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        background: linear-gradient(to bottom, transparent 50%, rgba(236, 72, 153, 0.02) 51%);
        background-size: 100% 4px;
        z-index: 50;
    }
    
    .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px 16px 60px;
        position: relative;
        z-index: 10;
    }
    
    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 32px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(236, 72, 153, 0.2);
    }
    
    .header-title {
        font-family: 'Workbench', sans-serif;
        font-size: 28px;
        font-weight: 400;
        letter-spacing: 0.15em;
        color: #fce7f3;
        text-shadow: 0 0 20px rgba(236, 72, 153, 0.5);
    }
    
    .header-sub {
        font-family: 'VT323', monospace;
        font-size: 12px;
        color: #ec4899;
        opacity: 0.7;
        letter-spacing: 0.1em;
    }
    
    .status-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: #6b7280;
        font-family: 'VT323', monospace;
    }
    
    .status-dot {
        width: 6px; height: 6px;
        background: #34d399;
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); }
    }
    
    .section-label {
        font-family: 'VT323', monospace;
        font-size: 14px;
        color: #ec4899;
        letter-spacing: 0.15em;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .section-label::after {
        content: '';
        flex: 1;
        height: 1px;
        background: linear-gradient(to right, rgba(236, 72, 153, 0.3), transparent);
    }
    
    .footer {
        text-align: center;
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid rgba(236, 72, 153, 0.1);
        font-size: 11px;
        color: #4b5563;
        font-family: 'VT323', monospace;
    }
    
    .footer span {
        color: #ec4899;
        opacity: 0.6;
    }
    
    @media (max-width: 640px) {
        .header { flex-direction: column; align-items: flex-start; gap: 8px; }
        .container { padding: 16px 12px 40px; }
    }
</style>
</head>
<body>
<div class="scanline-overlay"></div>

<div class="container">
    <div class="header">
        <div>
            <div class="header-title">HOT FEED</div>
            <div class="header-sub">X INTELLIGENCE MONITOR</div>
        </div>
        <div class="status-badge">
            <div class="status-dot"></div>
            LIVE · 2026-05-02 20:01 EST
        </div>
    </div>
    
    <div class="section-label">// TRENDING NOW</div>
    <div class="tweets-container">
        
        <div style="text-align: center; padding: 40px; color: #6b7280; font-family: 'VT323', monospace; font-size: 18px;">
            No tweets fetched — check network or X accounts
        </div>
    </div>
    
    <div class="footer">
        PINGPING AGENT · Auto-updated every 4h · <span>@sama @ylecun @AnthropicAI @mattwolftech @GrowthLead @jason</span>
    </div>
</div>

</body>
</html>
