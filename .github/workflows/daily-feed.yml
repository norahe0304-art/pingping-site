name: daily pingping feed

on:
  # 13:00 UTC = 9am ET / 6am PT — runs every day
  schedule:
    - cron: '0 13 * * *'
  # manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      date:
        description: 'Override date YYYY-MM-DD (defaults to today UTC)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: generate today's issue
        run: node scripts/pingping-daily.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PINGPING_DATE: ${{ inputs.date }}

      - name: commit & push
        run: |
          git config user.name "pingping"
          git config user.email "pingping@noreply.github.com"
          git add feed/days/
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          DATE="${PINGPING_DATE:-$(date -u +%Y-%m-%d)}"
          git commit -m "feed: ${DATE}"
          git push
        env:
          PINGPING_DATE: ${{ inputs.date }}
