name: daily pingping feed

on:
  # 13:00 UTC = 9am ET / 6am PT — runs every day
  schedule:
    - cron: '0 13 * * *'
  # manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      date:
        description: 'Override date YYYY-MM-DD (defaults to today UTC)'
        required: false
        default: ''
      rebuild_art:
        description: 'Re-roll Met art assignments for all stories (not just new ones)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ImageMagick — fetch-art-images.mjs pipes Met masterworks through
      # `magick` to resize 4000px+ originals down to 1400px @ q82 jpeg
      # (~13× size reduction, no perceptible quality loss at card size)
      - name: install imagemagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      # ----- step 1: write today's day json + manifest -----
      # writes feed/days/YYYY-MM-DD.json with 7 items, all image_url empty
      - name: generate today's issue
        run: node scripts/pingping-daily.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PINGPING_DATE: ${{ inputs.date }}

      # ----- step 2: pull a unique Met masterwork per story -----
      # idempotent: items that already have image_url keep theirs;
      # only the new day's empty slots get fresh search + download.
      # --rebuild forces re-roll of every slot (use sparingly).
      - name: fetch met art for new stories
        run: |
          if [ "${{ inputs.rebuild_art }}" = "true" ]; then
            node scripts/fetch-art-images.mjs --rebuild
          else
            node scripts/fetch-art-images.mjs
          fi

      # ----- step 3: ensure no two adjacent stripes share a color -----
      # within a day (rank order), across days (cover strip), and
      # cover ≠ that day's lead. Deterministic 4-color rotation.
      - name: diversify tag colors
        run: node scripts/diversify-tag-colors.mjs

      # ----- step 4: commit + push everything pingping just produced -----
      - name: commit & push
        run: |
          git config user.name "pingping"
          git config user.email "pingping@noreply.github.com"
          git add feed/days/ feed/art/
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          DATE="${PINGPING_DATE:-$(date -u +%Y-%m-%d)}"
          ART_COUNT=$(git diff --staged --name-only feed/art/ | wc -l | tr -d ' ')
          git commit -m "feed: ${DATE} (+${ART_COUNT} art)"
          git push
        env:
          PINGPING_DATE: ${{ inputs.date }}
