<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PingPing 日记</title>
  <style>
    :root { --bg:#0b0f14; --panel:#111722; --panel2:#0f1520; --line:#223044; --text:#e8eef7; --muted:#8ea0b8; --accent:#7dd3fc; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:linear-gradient(180deg,#0b0f14,#090c11); color:var(--text); font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; }
    .wrap { display:grid; grid-template-columns: 320px 1fr; min-height:100vh; }
    .sidebar { border-right:1px solid var(--line); background:rgba(15,21,32,.92); padding:20px 16px; position:sticky; top:0; height:100vh; overflow:auto; }
    .brand { font-size:12px; letter-spacing:.24em; color:var(--accent); margin-bottom:14px; }
    h1 { margin:0 0 14px; font-size:28px; }
    .search { width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--line); background:#0c121b; color:var(--text); outline:none; }
    .list { margin-top:14px; display:flex; flex-direction:column; gap:8px; }
    .entry-item { text-align:left; padding:12px; border-radius:12px; border:1px solid transparent; background:var(--panel2); color:var(--text); cursor:pointer; }
    .entry-item:hover,.entry-item.active { border-color:rgba(125,211,252,.45); background:#132030; }
    .entry-date { font-size:12px; color:var(--muted); margin-bottom:6px; }
    .entry-title { font-size:15px; line-height:1.4; }
    .main { padding:28px; }
    .reader { max-width:860px; margin:0 auto; background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:28px; min-height:70vh; }
    .meta { color:var(--muted); font-size:13px; margin-bottom:10px; }
    .title { font-size:32px; margin:0 0 18px; }
    .content-frame { width:100%; border:0; min-height:60vh; background:white; border-radius:14px; }
    @media (max-width: 900px) { .wrap { grid-template-columns:1fr; } .sidebar { position:relative; height:auto; } }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="sidebar">
      <div class="brand">PINGPING DIARY ARCHIVE</div>
      <h1>PingPing 日记</h1>
      <input id="q" class="search" placeholder="搜索日期 / 标题 / 内容" />
      <div class="list" id="list"></div>
    </aside>
    <main class="main">
      <section class="reader">
        <div class="meta">左边是列表，右边是正文。就这么简单。</div>
        <h2 class="title" id="title">暂无日记</h2>
        <div class="meta" id="date"></div>
        <iframe id="frame" class="content-frame"></iframe>
      </section>
    </main>
  </div>
  <script src="entries.js"></script>
  <script>
    const DATA = window.DIARY_DATA || [];
    const list = document.getElementById('list');
    const q = document.getElementById('q');
    const title = document.getElementById('title');
    const date = document.getElementById('date');
    const frame = document.getElementById('frame');
    function pick(e) {
      [...list.querySelectorAll('.entry-item')].forEach(x => x.classList.toggle('active', x === e));
      title.textContent = e.dataset.title;
      date.textContent = e.dataset.date;
      frame.src = e.dataset.file;
    }
    function filter() {
      const s = q.value.trim().toLowerCase();
      [...list.querySelectorAll('.entry-item')].forEach(e => {
        const hit = !s || e.dataset.title.toLowerCase().includes(s) || e.dataset.date.includes(s) || e.textContent.toLowerCase().includes(s);
        e.style.display = hit ? '' : 'none';
      });
    }
    list.addEventListener('click', ev => { const btn = ev.target.closest('.entry-item'); if (btn) pick(btn); });
    q.addEventListener('input', filter);
    list.innerHTML = DATA.map(e => `
      <button class="entry-item" data-file="${e.file}" data-title="${e.title}" data-date="${e.date}">
        <div class="entry-date">${e.date.replace(/-/g,'.')}</div>
        <div class="entry-title">${e.title}</div>
      </button>
    `).join('');
    const first = list.querySelector('.entry-item');
    if (first) pick(first);
  </script>
</body>
</html>
