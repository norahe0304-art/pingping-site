<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PingPing Diary</title>
<style>
:root{
  --bg:#f6f3ee; --panel:#ffffff; --panel-2:#fbfaf7; --line:#e7dfd4; --ink:#1f1f1f; --muted:#7b7166; --accent:#6f5a45; --accent-soft:#f0e6d9; --green:#64806a;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Inter","PingFang SC","Noto Sans SC",sans-serif;overflow:hidden}
a{color:inherit;text-decoration:none}
.app{display:grid;grid-template-columns:320px 1fr;height:100vh}
.sidebar{background:rgba(255,255,255,.55);backdrop-filter:blur(10px);border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:280px}
.brand{padding:22px 18px 14px;border-bottom:1px solid var(--line)}
.brand .eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
.brand h1{margin:8px 0 4px;font-size:1.35rem;letter-spacing:.12em}
.brand .meta{font-size:.82rem;color:var(--muted)}
.toolbar{padding:12px 14px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
.btn{border:1px solid var(--line);background:#fff;padding:7px 11px;border-radius:999px;font:inherit;font-size:.76rem;color:var(--muted);cursor:pointer}
.btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
.search{padding:10px 14px 14px;border-bottom:1px solid var(--line)}
.search input{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 12px;font:inherit;outline:none}
.search input:focus{border-color:#c8b9a8;box-shadow:0 0 0 3px rgba(111,90,69,.08)}
.list{overflow:auto;flex:1;padding:10px 10px 18px}
.month{padding:12px 10px 8px;font-size:.72rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}
.item{display:grid;grid-template-columns:52px 1fr;gap:10px;padding:10px 10px;border:1px solid transparent;border-radius:14px;cursor:pointer;transition:.15s ease}
.item:hover{background:rgba(255,255,255,.7);border-color:var(--line)}
.item.active{background:#fff;border-color:#d7c8b8;box-shadow:0 8px 26px rgba(27,19,12,.06)}
.day{font-size:1.28rem;font-weight:700;line-height:1;color:var(--accent)}
.wd{font-size:.7rem;color:var(--muted);margin-top:4px}
.ttl{font-weight:650;font-size:.96rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pv{margin-top:3px;font-size:.8rem;color:var(--muted);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tags{margin-top:7px;display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:.65rem;padding:2px 7px;border-radius:999px;background:#efede7;color:var(--muted)}
.tag.site{background:#e8dfd2;color:#65513c}
.tag.archive{background:#dce7db;color:#4f6a51}
  .viewer{overflow:auto;padding:18px;background:linear-gradient(180deg,#f8f6f2 0%, #f3efe8 100%)}
  .viewer-inner{max-width:980px;margin:0 auto;min-height:calc(100vh - 36px);background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 30px rgba(27,19,12,.06)}
  .viewer-head{padding:14px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:18px;align-items:center;font-size:.75rem;color:var(--muted);background:rgba(255,255,255,.7)}
  .viewer-body{padding:28px 30px 36px}
  .placeholder{padding:140px 20px;text-align:center;color:var(--muted);line-height:1.8}
  .title{margin:0 0 8px;font-size:1.9rem;line-height:1.18;letter-spacing:.01em;font-weight:800}
  .sub{margin-bottom:20px;color:var(--muted);font-size:.84rem}
  .content{max-width:760px;font-family:"Noto Serif SC","Songti SC",serif}
  .content p{margin:14px 0;text-align:justify;line-height:1.95}
  .content h1,.content h2{margin:24px 0 10px;line-height:1.25}
  .content h1:first-child,.content h2:first-child{display:none}
  .content h2{font-size:1.05rem;color:var(--accent);letter-spacing:.06em}
  .content hr{border:none;border-top:1px solid var(--line);margin:22px 0}
  .content .note{text-align:right;color:var(--muted);text-indent:0}

  body{overflow:auto}
  .app{grid-template-columns:1fr;height:auto;min-height:100vh}
  .sidebar{height:auto;max-height:48vh}
  .viewer{padding:0}
  .viewer-inner{border:none;border-radius:0;box-shadow:none;min-height:auto}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="eyebrow">Diary CRM</div>
      <h1>PingPing 日记</h1>
      <div class="meta"><span id="total">0</span> 篇 · 左边选，右边看</div>
    </div>
    <div class="toolbar">
      <button class="btn active" data-filter="all">全部</button>
      <button class="btn" data-filter="site">site</button>
      <button class="btn" data-filter="archive">archive</button>
    </div>
    <div class="search"><input id="q" placeholder="搜索日期 / 标题 / 内容"></div>
    <div class="list" id="list"></div>
  </aside>
  <main class="viewer">
    <div class="viewer-inner">
      <div class="viewer-head"><span>viewer</span><span id="viewer-date">—</span></div>
      <div class="viewer-body" id="viewer"><div class="placeholder">从左边选一篇。<br>这里会直接展开全文，不跳页面。</div></div>
    </div>
  </main>
</div>
<script src="entries.js"></script>
<script>
const WEEKDAYS=['周日','周一','周二','周三','周四','周五','周六'];
const DATA = window.DIARY_DATA || [];
let filter='all';
let query='';
let activeId = DATA[0]?.sid || null;

document.getElementById('total').textContent = DATA.length;

function monthLabel(d){ const [y,m]=d.split('-'); const n=['','一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月']; return `${y} 年 · ${n[+m]}`; }
function dt(s){ return new Date(s+'T12:00:00'); }
function matches(e){
  const q=query.trim().toLowerCase();
  const okFilter = filter==='all' || e.source===filter;
  if(!q) return okFilter;
  const text=`${e.date} ${e.title||''} ${e.preview||''} ${e.html||''}`.toLowerCase();
  return okFilter && text.includes(q);
}
function renderList(){
  const items = DATA.filter(matches);
  const groups = new Map();
  items.forEach(e=>{ const ym=e.date.slice(0,7); if(!groups.has(ym)) groups.set(ym,[]); groups.get(ym).push(e); });
  const months = [...groups.keys()].sort().reverse();
  let out='';
  for(const ym of months){
    out += `<div class="month">${monthLabel(ym+'-01')}</div>`;
    groups.get(ym).sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>{
      const d=dt(e.date); const day=d.getDate(); const wd=WEEKDAYS[d.getDay()];
      const outTitle = e.title || ((e.html || '').match(/<h[12][^>]*>([^<]+)<\/h[12]>/i) || [,''])[1] || '（无标题）';
      out += `<div class="item ${e.sid===activeId?'active':''}" data-id="${e.sid}">
        <div><div class="day">${day}</div><div class="wd">${wd}</div></div>
        <div>
          <div class="ttl">${outTitle}</div>
          <div class="pv">${e.preview || ''}</div>
          <div class="tags"><span class="tag ${e.source}">${e.source}</span></div>
        </div>
      </div>`;
    });
  }
  document.getElementById('list').innerHTML = out || '<div class="placeholder">没有匹配结果。</div>';
  document.querySelectorAll('.item').forEach(el=>el.addEventListener('click',()=>select(el.dataset.id)));
}
function select(id){
  activeId=id;
  const e = DATA.find(x=>x.sid===id) || DATA[0];
  if(!e) return;
  const d=dt(e.date);
  const body = (e.html || '<p>' + (e.preview || '') + '</p>')
    .replace(/^<h1>.*?<\/h1>\s*/i,'')
    .replace(/^<h2>.*?<\/h2>\s*/i,'');
  const derivedTitle = e.title || ((e.html || '').match(/<h[12][^>]*>([^<]+)<\/h[12]>/i) || [,''])[1];
  document.getElementById('viewer-date').textContent = `${e.date} · ${WEEKDAYS[d.getDay()]}`;
  document.getElementById('viewer').innerHTML = `
    <div class="sub">${e.source === 'archive' ? 'legacy archive' : 'pingping-site'}</div>
    <h2 class="title">${derivedTitle || '（无标题）'}</h2>
    <div class="content">${body}</div>
  `;
  renderList();
}

document.querySelectorAll('.btn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); filter=btn.dataset.filter; renderList();
}));
document.getElementById('q').addEventListener('input',e=>{ query=e.target.value; renderList(); });
renderList();
if(activeId) select(activeId);
</script>
</body>
</html>
