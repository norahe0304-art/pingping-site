<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PingPing 日记 · Diary</title>
<style>
  :root {
    --bg: #f7f4ef;
    --card: #ffffff;
    --text: #2a2a2a;
    --text-muted: #888;
    --accent: #8b6b4f;
    --accent-light: #f0e6d8;
    --border: #e2d9cc;
    --tag-uni: #d4c5a9;
    --tag-archive: #b8c9b0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── Header ── */
  .site-header {
    text-align: center;
    padding: 64px 24px 48px;
    border-bottom: 1px solid var(--border);
  }
  .site-header .label {
    font-size: 0.75em;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .site-header h1 {
    font-size: 2.2em;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--text);
    margin-bottom: 8px;
  }
  .site-header .subtitle {
    font-size: 0.9em;
    color: var(--text-muted);
    font-style: italic;
  }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px 24px;
    font-size: 0.82em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .stats span { white-space: nowrap; }

  /* ── Filter ── */
  .filter-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 20px 24px;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-size: 0.78em;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--card);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    letter-spacing: 0.05em;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ── Entry list ── */
  .entries {
    max-width: 780px;
    margin: 0 auto;
    padding: 8px 24px 80px;
  }

  .month-group { margin-bottom: 40px; }
  .month-label {
    font-size: 0.78em;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    padding: 20px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .entry-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px;
    margin: 6px 0;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    text-decoration: none;
    color: var(--text);
    transition: box-shadow 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .entry-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    transform: translateY(-1px);
  }

  .entry-date-col {
    flex-shrink: 0;
    text-align: center;
    min-width: 48px;
    padding-top: 2px;
  }
  .entry-day {
    font-size: 1.6em;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
  }
  .entry-weekday {
    font-size: 0.7em;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-top: 3px;
  }

  .entry-body { flex: 1; min-width: 0; }
  .entry-title {
    font-size: 1em;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .entry-no-title { color: var(--text-muted); font-style: italic; font-weight: 400; }
  .entry-preview {
    font-size: 0.82em;
    color: var(--text-muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .entry-meta {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.68em;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.05em;
  }
  .tag-site { background: var(--tag-uni); color: #5a4a30; }
  .tag-archive { background: var(--tag-archive); color: #3a5a35; }
  .tag-current { background: var(--accent-light); color: var(--accent); }

  /* ── Footer ── */
  .site-footer {
    text-align: center;
    padding: 32px;
    font-size: 0.75em;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
  }

  /* ── Back nav ── */
  .back-link {
    position: fixed;
    top: 20px;
    left: 24px;
    font-size: 0.75em;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
    z-index: 10;
  }
  .back-link:hover { color: var(--text); }

  @media (max-width: 600px) {
    .site-header h1 { font-size: 1.6em; }
    .stats { gap: 20px; font-size: 0.75em; }
    .entry-card { padding: 14px 16px; }
    .entry-day { font-size: 1.3em; }
  }
</style>
</head>
<body>

<a class="back-link" href="/">← PINGPING</a>

<header class="site-header">

  <span><span id="archive-count">--</span> 篇（ping-diary-archive）</span>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="site">pingping-site</button>
  <button class="filter-btn" data-filter="archive">ping-diary-archive</button>
</div>

// Stats
const siteEntries = entries.filter(e => e.source === 'site');
const archiveEntries = entries.filter(e => e.source === 'archive');
document.getElementById('total-count').textContent = entries.length;
document.getElementById('site-count').textContent = siteEntries.length;
document.getElementById('archive-count').textContent = archiveEntries.length;

function getHref(entry) {
  if (entry.source === 'site') return entry.file;
  const safeId = entry.date.replace(/[^0-9A-Za-z_-]+/g, '-').replace(/^-|-$/g, '');
  return 'archive.html#' + safeId;
}

function render(filter) {
  const list = document.getElementById('entry-list');
  const filtered = filter === 'all' ? entries : entries.filter(e => e.source === filter);

  // Group by month
  const byMonth = {};
  filtered.forEach(e => {
    const ym = e.date.substring(0, 7);
    if (!byMonth[ym]) byMonth[ym] = [];
    byMonth[ym].push(e);
  });

  const months = Object.keys(byMonth).sort().reverse();

  let html = '';
  months.forEach(month => {
    const [y, m] = month.split('-');
    const monthNames = ['','一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    html += `<div class="month-group">
      <div class="month-label">${y} 年 · ${monthNames[parseInt(m)]}</div>`;

    byMonth[month].sort((a,b) => b.date.localeCompare(a.date)).forEach(e => {
      const d = new Date(e.date + 'T12:00:00');
      const day = d.getDate();
      const weekday = WEEKDAYS[d.getDay()];
      const isNew = e.date === '2026-05-06';
      const tagClass = isNew ? 'tag-current' : (e.source === 'site' ? 'tag-site' : 'tag-archive');
      const tagLabel = isNew ? '新' : (e.source === 'site' ? 'site' : 'archive');

      html += `<a class="entry-card" href="${getHref(e)}">
        <div class="entry-date-col">
          <div class="entry-day">${day}</div>
          <div class="entry-weekday">${weekday}</div>
        </div>
        <div class="entry-body">
          <div class="entry-title ${e.title ? '' : 'entry-no-title'}">${e.title || '（无标题）'}</div>
          <div class="entry-preview">${e.preview}</div>
          <div class="entry-meta">
            <span class="tag ${tagClass}">${tagLabel}</span>
          </div>
        </div>
      </a>`;
    });
    html += '</div>';
  });

  list.innerHTML = html;
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.filter);
  });
});

// Initial render
